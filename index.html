<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş Sayfası</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  /* ============================
     anasayfa.css – Giriş Sayfası
     ============================ */

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --primary: #3366CC;
    --primary-hover: #2952a3;
    --primary-light: #e8f0fe;
    --bg-dark: #0a0a0a;
    --bg-welcome: #050505;
    --text-primary: #ffffff;
    --text-secondary: #a1a1aa;
    --text-dark: #18181b;
    --border-light: rgba(255,255,255,0.08);
    --border-dark: rgba(0,0,0,0.1);
    --card-bg: rgba(24,24,27,0.3);
    --btn-bg: #ffffff;
    --btn-text: #18181b;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
    --shadow-2xl: 0 25px 50px -12px rgba(0,0,0,0.25);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --transition-fast: 150ms cubic-bezier(0.4,0,0.2,1);
    --transition-mid: 300ms cubic-bezier(0.4,0,0.2,1);
    --transition-slow: 500ms cubic-bezier(0.4,0,0.2,1);
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes pulse-ring {
    0%   { transform: scale(0.9); opacity: 0.6; }
    50%  { transform: scale(1.05); opacity: 0.3; }
    100% { transform: scale(0.9); opacity: 0.6; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .animate-fade-in-up {
    animation: fadeInUp 0.8s ease-out forwards;
  }

  .animate-fade-in {
    animation: fadeIn 0.6s ease-out forwards;
  }

  .delay-100 { animation-delay: 100ms; }
  .delay-200 { animation-delay: 200ms; }
  .delay-300 { animation-delay: 300ms; }
  .delay-400 { animation-delay: 400ms; }
  .delay-500 { animation-delay: 500ms; }
  .delay-600 { animation-delay: 600ms; }
  .delay-700 { animation-delay: 700ms; }
  .delay-800 { animation-delay: 800ms; }

  /* ---- LANDING PAGE CONTAINER ---- */
  .landing-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 40px 24px;
  }

  /* ---- BACKGROUND ---- */
  .landing-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .landing-bg__image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.15;
    filter: saturate(0.3);
  }

  .landing-bg__gradient {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 50% 0%, rgba(51,102,204,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(51,102,204,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 80%, rgba(100,140,220,0.06) 0%, transparent 50%),
      linear-gradient(to bottom, var(--bg-dark), #050505);
  }

  .landing-bg__noise {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    opacity: 0.5;
    pointer-events: none;
  }

  /* ---- DECORATIVE ORBS ---- */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }

  .orb--1 {
    width: 400px;
    height: 400px;
    background: rgba(51,102,204,0.12);
    top: -100px;
    left: -100px;
    animation: pulse-ring 8s ease-in-out infinite;
  }

  .orb--2 {
    width: 300px;
    height: 300px;
    background: rgba(100,140,220,0.08);
    bottom: -80px;
    right: -80px;
    animation: pulse-ring 10s ease-in-out infinite 2s;
  }

  .orb--3 {
    width: 200px;
    height: 200px;
    background: rgba(51,102,204,0.06);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse-ring 6s ease-in-out infinite 1s;
  }

  /* ---- MAIN CONTENT ---- */
  .landing-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 640px;
    width: 100%;
  }

  /* ---- LOGO ---- */
  .logo-container {
    position: relative;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeInUp 0.8s ease-out 0.1s forwards;
  }

  .logo-ring {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid rgba(51,102,204,0.2);
    animation: pulse-ring 4s ease-in-out infinite;
  }

  .logo-ring--outer {
    position: absolute;
    inset: -32px;
    border-radius: 50%;
    border: 1px solid rgba(51,102,204,0.1);
    animation: pulse-ring 5s ease-in-out infinite 1s;
  }

  .logo-globe {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3366CC 0%, #2952a3 40%, #1a3d7a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 
      0 0 60px rgba(51,102,204,0.3),
      0 0 120px rgba(51,102,204,0.15),
      inset 0 -4px 12px rgba(0,0,0,0.3),
      inset 0 4px 12px rgba(255,255,255,0.15);
    animation: float 6s ease-in-out infinite;
  }

  .logo-globe__grid {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
  }

  .logo-globe__grid::before {
    content: '';
    position: absolute;
    inset: -50%;
    background: 
      repeating-linear-gradient(0deg, transparent, transparent 18px, rgba(255,255,255,0.06) 18px, rgba(255,255,255,0.06) 19px),
      repeating-linear-gradient(90deg, transparent, transparent 18px, rgba(255,255,255,0.06) 18px, rgba(255,255,255,0.06) 19px);
    animation: spin-slow 60s linear infinite;
  }

  .logo-globe__icon {
    color: #ffffff;
    z-index: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }

  .logo-text {
    text-align: center;
    margin-top: 24px;
  }

  .logo-text__title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .logo-text__subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 6px;
    font-weight: 400;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ---- SEARCH ---- */
  .search-container {
    width: 100%;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeInUp 0.8s ease-out 0.3s forwards;
  }

  .search-wrapper {
    position: relative;
    width: 100%;
  }

  .search-input {
    width: 100%;
    height: 56px;
    background: rgba(24,24,27,0.6);
    border: 1px solid var(--border-light);
    border-radius: 28px;
    padding: 0 56px 0 52px;
    font-size: 16px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: all var(--transition-mid);
    backdrop-filter: blur(12px);
  }

  .search-input::placeholder {
    color: #71717a;
  }

  .search-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(51,102,204,0.15), var(--shadow-lg);
    background: rgba(24,24,27,0.8);
  }

  .search-input:hover:not(:focus) {
    border-color: rgba(255,255,255,0.15);
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #71717a;
    pointer-events: none;
    transition: color var(--transition-fast);
  }

  .search-input:focus ~ .search-icon {
    color: var(--primary);
  }

  .search-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--primary);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    transition: all var(--transition-fast);
    box-shadow: 0 2px 8px rgba(51,102,204,0.3);
  }

  .search-btn:hover {
    background: var(--primary-hover);
    transform: translateY(-50%) scale(1.05);
    box-shadow: 0 4px 16px rgba(51,102,204,0.4);
  }

  .search-btn:active {
    transform: translateY(-50%) scale(0.95);
  }

  /* ---- LIVE SEARCH RESULTS ---- */
  .search-results {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 0;
    background: rgba(24,24,27,0.95);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(24px);
    overflow: hidden;
    display: none;
    z-index: 50;
    box-shadow: var(--shadow-2xl);
    animation: slideDown 0.2s ease-out;
  }

  .search-results.active {
    display: block;
  }

  .search-results__item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    cursor: pointer;
    transition: background var(--transition-fast);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .search-results__item:last-child {
    border-bottom: none;
  }

  .search-results__item:hover {
    background: rgba(51,102,204,0.1);
  }

  .search-results__item-icon {
    color: var(--primary);
    flex-shrink: 0;
  }

  .search-results__item-text {
    flex: 1;
    min-width: 0;
  }

  .search-results__item-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .search-results__item-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .search-results__empty {
    padding: 24px 18px;
    text-align: center;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .search-results__footer {
    padding: 10px 18px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 11px;
    color: #52525b;
    text-align: center;
  }

  /* ---- CATEGORIES ---- */
  .categories-container {
    width: 100%;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeInUp 0.8s ease-out 0.5s forwards;
  }

  .categories-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #71717a;
    margin-bottom: 12px;
    text-align: center;
  }

  .categories-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }

  .category-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(24,24,27,0.5);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all var(--transition-fast);
    user-select: none;
    backdrop-filter: blur(8px);
  }

  .category-chip:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text-primary);
    background: rgba(24,24,27,0.7);
    transform: translateY(-1px);
  }

  .category-chip.active {
    border-color: var(--primary);
    background: rgba(51,102,204,0.15);
    color: #93b5f0;
    box-shadow: 0 0 12px rgba(51,102,204,0.15);
  }

  .category-chip__icon {
    width: 14px;
    height: 14px;
  }

  /* ---- ACTION ROW ---- */
  .action-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    width: 100%;
    opacity: 0;
    animation: fadeInUp 0.8s ease-out 0.7s forwards;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    border-radius: 28px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    border: none;
    transition: all var(--transition-fast);
    text-decoration: none;
    white-space: nowrap;
  }

  .btn--primary {
    background: var(--primary);
    color: #ffffff;
    box-shadow: 0 2px 12px rgba(51,102,204,0.3);
  }

  .btn--primary:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(51,102,204,0.4);
  }

  .btn--primary:active {
    transform: translateY(0);
  }

  .btn--secondary {
    background: rgba(24,24,27,0.6);
    color: var(--text-primary);
    border: 1px solid var(--border-light);
    backdrop-filter: blur(8px);
  }

  .btn--secondary:hover {
    background: rgba(24,24,27,0.8);
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-2px);
  }

  .btn--secondary:active {
    transform: translateY(0);
  }

  .btn--ghost {
    background: transparent;
    color: var(--text-secondary);
    padding: 14px 20px;
  }

  .btn--ghost:hover {
    color: var(--text-primary);
    background: rgba(255,255,255,0.05);
  }

  /* ---- LANGUAGE / FOOTER ---- */
  .landing-footer {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 1;
    opacity: 0;
    animation: fadeIn 1s ease-out 1s forwards;
  }

  .landing-footer__links {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .landing-footer__link {
    font-size: 12px;
    color: #52525b;
    text-decoration: none;
    transition: color var(--transition-fast);
  }

  .landing-footer__link:hover {
    color: var(--text-secondary);
  }

  .landing-footer__copy {
    font-size: 11px;
    color: #3f3f46;
  }

  /* ---- TOAST ---- */
  .toast-container {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: rgba(24,24,27,0.95);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    backdrop-filter: blur(24px);
    box-shadow: var(--shadow-2xl);
    font-size: 13px;
    color: var(--text-primary);
    animation: slideDown 0.3s ease-out;
    max-width: 360px;
  }

  .toast__icon {
    flex-shrink: 0;
  }

  .toast--success .toast__icon { color: #4ade80; }
  .toast--error .toast__icon   { color: #f87171; }
  .toast--info .toast__icon    { color: #60a5fa; }

  .toast__close {
    margin-left: auto;
    background: none;
    border: none;
    color: #71717a;
    cursor: pointer;
    padding: 2px;
    transition: color var(--transition-fast);
  }

  .toast__close:hover {
    color: var(--text-primary);
  }

  /* ---- LOGIN MODAL ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.active {
    display: flex;
    animation: fadeIn 0.2s ease-out;
  }

  .modal {
    background: #18181b;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    width: 100%;
    max-width: 420px;
    padding: 36px;
    animation: fadeInUp 0.3s ease-out;
    position: relative;
  }

  .modal__close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: #71717a;
    cursor: pointer;
    padding: 4px;
    transition: color var(--transition-fast);
  }

  .modal__close:hover {
    color: var(--text-primary);
  }

  .modal__title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .modal__subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 28px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    height: 46px;
    background: rgba(24,24,27,0.6);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 0 14px;
    font-size: 14px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: all var(--transition-fast);
  }

  .form-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(51,102,204,0.15);
  }

  .form-input::placeholder {
    color: #52525b;
  }

  .form-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .form-checkbox {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .form-checkbox input {
    accent-color: var(--primary);
    width: 16px;
    height: 16px;
  }

  .form-checkbox span {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .form-forgot {
    font-size: 13px;
    color: var(--primary);
    text-decoration: none;
    transition: color var(--transition-fast);
  }

  .form-forgot:hover {
    color: #60a5fa;
  }

  .form-submit {
    width: 100%;
    height: 48px;
    background: var(--primary);
    color: #ffffff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .form-submit:hover {
    background: var(--primary-hover);
  }

  .form-divider {
    text-align: center;
    font-size: 12px;
    color: #52525b;
    margin: 20px 0;
    position: relative;
  }

  .form-divider::before,
  .form-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: calc(50% - 30px);
    height: 1px;
    background: var(--border-light);
  }

  .form-divider::before { left: 0; }
  .form-divider::after  { right: 0; }

  .form-register {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .form-register a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
    transition: color var(--transition-fast);
  }

  .form-register a:hover {
    color: #60a5fa;
  }

  /* ---- MOBILE RESPONSIVE ---- */
  @media (max-width: 640px) {
    .landing-page {
      padding: 24px 16px;
    }

    .logo-globe {
      width: 110px;
      height: 110px;
    }

    .logo-text__title {
      font-size: 22px;
    }

    .logo-text__subtitle {
      font-size: 12px;
    }

    .search-input {
      height: 50px;
      font-size: 15px;
      border-radius: 25px;
      padding: 0 50px 0 46px;
    }

    .search-btn {
      width: 40px;
      height: 40px;
    }

    .categories-list {
      gap: 6px;
    }

    .category-chip {
      padding: 6px 12px;
      font-size: 12px;
    }

    .action-row {
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .btn {
      width: 100%;
      justify-content: center;
    }

    .landing-footer {
      position: relative;
      bottom: auto;
      margin-top: 40px;
    }

    .orb--1 { width: 250px; height: 250px; }
    .orb--2 { width: 200px; height: 200px; }
    .orb--3 { width: 150px; height: 150px; }

    .toast-container {
      top: 12px;
      right: 12px;
      left: 12px;
    }

    .toast {
      max-width: 100%;
    }

    .modal {
      padding: 28px 24px;
    }
  }

  @media (min-width: 641px) and (max-width: 1024px) {
    .landing-content {
      max-width: 560px;
    }
  }

  /* ---- WORDPRESS COMPATIBILITY ---- */
  /* Reset theme conflicts */
  .landing-page *:not(.search-input):not(.form-input) {
    line-height: 1.5;
  }

  /* WordPress admin bar offset */
  body.admin-bar .landing-page {
    min-height: calc(100vh - 32px);
  }

  @media (max-width: 782px) {
    body.admin-bar .landing-page {
      min-height: calc(100vh - 46px);
    }
  }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="landing-bg">
  <div class="orb orb--1"></div>
  <div class="orb orb--2"></div>
  <div class="orb orb--3"></div>
  <div class="landing-bg__gradient"></div>
  <div class="landing-bg__noise"></div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="modal__close" id="modalClose" aria-label="Kapat">
      <i data-lucide="x" style="width:18px;height:18px;"></i>
    </button>
    <h2 class="modal__title">Giriş Yap</h2>
    <p class="modal__subtitle">Hesabınıza giriş yaparak içeriğe erişin</p>
    
    <form id="loginForm" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label" for="loginEmail">E-posta</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="ornek@mail.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Şifre</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <div class="form-row">
        <label class="form-checkbox">
          <input type="checkbox" checked>
          <span>Beni hatırla</span>
        </label>
        <a href="#" class="form-forgot">Şifremi unuttum</a>
      </div>
      <button type="submit" class="form-submit" id="loginSubmitBtn">Giriş Yap</button>
    </form>
    
    <div class="form-divider">veya</div>
    
    <p class="form-register">
      Hesabınız yok mu? <a href="#" id="registerLink">Kayıt Ol</a>
    </p>
  </div>
</div>

<!-- MAIN LANDING PAGE -->
<main class="landing-page">
  <div class="landing-content">

    <!-- LOGO -->
    <div class="logo-container">
      <div class="logo-ring--outer"></div>
      <div class="logo-ring"></div>
      <div class="logo-globe">
        <div class="logo-globe__grid"></div>
        <i data-lucide="globe" class="logo-globe__icon" style="width:56px;height:56px;"></i>
      </div>
      <div class="logo-text">
        <h1 class="logo-text__title">Site Adı</h1>
        <p class="logo-text__subtitle">Bilgiye Giden Yol</p>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-container">
      <div class="search-wrapper">
        <input 
          type="text" 
          class="search-input" 
          id="searchInput" 
          placeholder="Ne aramak istiyorsunuz?" 
          autocomplete="off"
        >
        <i data-lucide="search" class="search-icon" style="width:20px;height:20px;"></i>
        <button class="search-btn" id="searchBtn" aria-label="Ara">
          <i data-lucide="arrow-right" style="width:18px;height:18px;"></i>
        </button>
        
        <!-- LIVE SEARCH RESULTS -->
        <div class="search-results" id="searchResults">
          <!-- Dinamik olarak JS ile doldurulacak -->
        </div>
      </div>
    </div>

    <!-- CATEGORIES -->
    <div class="categories-container">
      <p class="categories-label">Kategoriler</p>
      <div class="categories-list" id="categoriesList">
        <button class="category-chip" data-category="teknoloji">
          <i data-lucide="cpu" class="category-chip__icon"></i>
          Teknoloji
        </button>
        <button class="category-chip" data-category="bilim">
          <i data-lucide="flask-conical" class="category-chip__icon"></i>
          Bilim
        </button>
        <button class="category-chip" data-category="sanat">
          <i data-lucide="palette" class="category-chip__icon"></i>
          Sanat
        </button>
        <button class="category-chip" data-category="tarih">
          <i data-lucide="landmark" class="category-chip__icon"></i>
          Tarih
        </button>
        <button class="category-chip" data-category="edebiyat">
          <i data-lucide="book-open" class="category-chip__icon"></i>
          Edebiyat
        </button>
        <button class="category-chip" data-category="muzik">
          <i data-lucide="music" class="category-chip__icon"></i>
          Müzik
        </button>
        <button class="category-chip" data-category="saglik">
          <i data-lucide="heart-pulse" class="category-chip__icon"></i>
          Sağlık
        </button>
        <button class="category-chip" data-category="seyahat">
          <i data-lucide="plane" class="category-chip__icon"></i>
          Seyahat
        </button>
      </div>
    </div>

    <!-- ACTION ROW -->
    <div class="action-row">
      <button class="btn btn--secondary" id="loginBtn">
        <i data-lucide="home" style="width:18px;height:18px;"></i>
        Giriş Yap
      </button>
      <a href="#home" class="btn btn--primary" id="enterSiteBtn">
        <i data-lucide="log-in" style="width:18px;height:18px;"></i>
        Siteye Gir
      </a>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="landing-footer">
    <div class="landing-footer__links">
      <a href="#" class="landing-footer__link">Hakkımızda</a>
      <a href="#" class="landing-footer__link">Gizlilik</a>
      <a href="#" class="landing-footer__link">Kullanım Şartları</a>
      <a href="#" class="landing-footer__link">İletişim</a>
    </div>
    <p class="landing-footer__copy">© 2025 Site Adı. Tüm hakları saklıdır.</p>
  </footer>
</main>

<script>
  // ============================
  // Lucide Icons Initialization
  // ============================
  lucide.createIcons();

  // ============================
  // Toast Notification System
  // ============================
  function showToast(message, type = 'info', duration = 3000) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast toast--${type}`;

    const iconMap = {
      success: 'check-circle',
      error: 'alert-circle',
      info: 'info'
    };

    toast.innerHTML = `
      <i data-lucide="${iconMap[type] || 'info'}" class="toast__icon" style="width:18px;height:18px;"></i>
      <span>${message}</span>
      <button class="toast__close" onclick="this.parentElement.remove()">
        <i data-lucide="x" style="width:14px;height:14px;"></i>
      </button>
    `;

    container.appendChild(toast);
    lucide.createIcons({ nodes: [toast] });

    setTimeout(() => {
      if (toast.parentElement) {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }
    }, duration);
  }

  // ============================
  // Live Search
  // ============================
  const sampleData = [
    { title: 'Yapay Zeka', desc: 'Makine öğrenimi ve derin öğrenme', category: 'teknoloji' },
    { title: 'Kuantum Fiziği', desc: 'Atom altı parçacıkların dünyası', category: 'bilim' },
    { title: 'Rönesans Sanatı', desc: '14.-17. yüzyıl Avrupa sanatı', category: 'sanat' },
    { title: 'Osmanlı İmparatorluğu', desc: '1299-1922 dönemi tarihi', category: 'tarih' },
    { title: 'Türk Edebiyatı', desc: 'Divan edebiyatından modern edebiyata', category: 'edebiyat' },
    { title: 'Klasik Müzik', desc: 'Barok, klasik ve romantik dönem', category: 'muzik' },
    { title: 'Beslenme ve Diyet', desc: 'Sağlıklı yaşam rehberi', category: 'saglik' },
    { title: 'İstanbul Rehberi', desc: 'Gezi ve keşif rotaları', category: 'seyahat' },
    { title: 'Blok Zinciri', desc: 'Kripto para ve decentralized sistemler', category: 'teknoloji' },
    { title: 'DNA ve Genetik', desc: 'Kalıtım ve gen mühendisliği', category: 'bilim' },
    { title: 'İzmir Sahilleri', desc: 'Ege kıyılarının güzellikleri', category: 'seyahat' },
    { title: 'Dijital Sağlık', desc: 'Teknoloji ve sağlık birleşimi', category: 'saglik' },
    { title: 'Cappadocia', desc: 'Peri bacaları ve sıcak hava balonları', category: 'seyahat' },
    { title: 'Orhan Pamuk', desc: 'Nobel ödüllü Türk yazar', category: 'edebiyat' },
    { title: 'Cumhuriyet Tarihi', desc: "1923'ten günümüze Türkiye", category: 'tarih' },
  ];

  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  const searchBtn = document.getElementById('searchBtn');
  let activeCategory = null;

  function performSearch(query) {
    query = query.trim().toLowerCase();
    let results = sampleData;

    if (activeCategory) {
      results = results.filter(item => item.category === activeCategory);
    }

    if (query.length > 0) {
      results = results.filter(item =>
        item.title.toLowerCase().includes(query) ||
        item.desc.toLowerCase().includes(query)
      );
    }

    return results;
  }

  function renderResults(results, query) {
    if (query.length === 0 && !activeCategory) {
      searchResults.classList.remove('active');
      return;
    }

    if (results.length === 0) {
      searchResults.innerHTML = `
        <div class="search-results__empty">
          <i data-lucide="search-x" style="width:24px;height:24px;display:inline-block;margin-bottom:6px;color:#52525b;"></i>
          <br>"${query}" için sonuç bulunamadı
        </div>
      `;
    } else {
      const iconMap = {
        teknoloji: 'cpu',
        bilim: 'flask-conical',
        sanat: 'palette',
        tarih: 'landmark',
        edebiyat: 'book-open',
        muzik: 'music',
        saglik: 'heart-pulse',
        seyahat: 'plane'
      };

      searchResults.innerHTML = results.map(item => `
        <div class="search-results__item" data-title="${item.title}">
          <i data-lucide="${iconMap[item.category] || 'circle'}" class="search-results__item-icon" style="width:16px;height:16px;"></i>
          <div class="search-results__item-text">
            <div class="search-results__item-title">${item.title}</div>
            <div class="search-results__item-desc">${item.desc}</div>
          </div>
        </div>
      `).join('') + `
        <div class="search-results__footer">
          ${results.length} sonuç bulundu
        </div>
      `;
    }

    searchResults.classList.add('active');
    lucide.createIcons({ nodes: [searchResults] });

    // Click on result
    searchResults.querySelectorAll('.search-results__item').forEach(item => {
      item.addEventListener('click', () => {
        const title = item.getAttribute('data-title');
        showToast(`"${title}" sayfasına yönlendiriliyorsunuz...`, 'info');
        searchResults.classList.remove('active');
        searchInput.value = title;
      });
    });
  }

  searchInput.addEventListener('input', (e) => {
    const query = e.target.value;
    const results = performSearch(query);
    renderResults(results, query);
  });

  searchInput.addEventListener('focus', () => {
    const query = searchInput.value;
    if (query.length > 0 || activeCategory) {
      const results = performSearch(query);
      renderResults(results, query);
    }
  });

  searchBtn.addEventListener('click', () => {
    const query = searchInput.value.trim();
    if (query.length > 0) {
      showToast(`"${query}" için arama yapılıyor...`, 'info');
      searchResults.classList.remove('active');
    } else {
      searchInput.focus();
    }
  });

  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      searchBtn.click();
    }
  });

  // Close search results on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-container')) {
      searchResults.classList.remove('active');
    }
  });

  // ============================
  // Category Selection
  // ============================
  const categoryChips = document.querySelectorAll('.category-chip');

  categoryChips.forEach(chip => {
    chip.addEventListener('click', () => {
      const category = chip.getAttribute('data-category');

      if (chip.classList.contains('active')) {
        chip.classList.remove('active');
        activeCategory = null;
        showToast('Kategori filtresi kaldırıldı', 'info');
      } else {
        categoryChips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeCategory = category;

        const categoryNames = {
          teknoloji: 'Teknoloji',
          bilim: 'Bilim',
          sanat: 'Sanat',
          tarih: 'Tarih',
          edebiyat: 'Edebiyat',
          muzik: 'Müzik',
          saglik: 'Sağlık',
          seyahat: 'Seyahat'
        };
        showToast(`${categoryNames[category]} kategorisi seçildi`, 'success');
      }

      // Update search results if input has value
      const query = searchInput.value;
      const results = performSearch(query);
      if (query.length > 0 || activeCategory) {
        renderResults(results, query);
      }
    });
  });

  // ============================
  // Login Modal
  // ============================
  const loginModal = document.getElementById('loginModal');
  const loginBtn = document.getElementById('loginBtn');
  const modalClose = document.getElementById('modalClose');
  const loginForm = document.getElementById('loginForm');
  const loginSubmitBtn = document.getElementById('loginSubmitBtn');
  const registerLink = document.getElementById('registerLink');

  loginBtn.addEventListener('click', () => {
    loginModal.classList.add('active');
  });

  modalClose.addEventListener('click', () => {
    loginModal.classList.remove('active');
  });

  loginModal.addEventListener('click', (e) => {
    if (e.target === loginModal) {
      loginModal.classList.remove('active');
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && loginModal.classList.contains('active')) {
      loginModal.classList.remove('active');
    }
  });

  loginForm.addEventListener('submit', () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      showToast('Lütfen tüm alanları doldurun', 'error');
      return;
    }

    loginSubmitBtn.textContent = 'Giriş yapılıyor...';
    loginSubmitBtn.disabled = true;

    setTimeout(() => {
      loginSubmitBtn.textContent = 'Giriş Yap';
      loginSubmitBtn.disabled = false;
      loginModal.classList.remove('active');
      showToast('Başarıyla giriş yapıldı!', 'success');

      // Update button text after login
      loginBtn.innerHTML = `
        <i data-lucide="user-check" style="width:18px;height:18px;"></i>
        Hesabım
      `;
      lucide.createIcons({ nodes: [loginBtn] });
    }, 1500);
  });

  registerLink.addEventListener('click', (e) => {
    e.preventDefault();
    showToast('Kayıt sayfasına yönlendiriliyorsunuz...', 'info');
  });

  // ============================
  // Enter Site Button
  // ============================
  const enterSiteBtn = document.getElementById('enterSiteBtn');

  enterSiteBtn.addEventListener('click', (e) => {
    e.preventDefault();
    showToast('Anasayfaya yönlendiriliyorsunuz...', 'success');

    // WordPress'te: window.location.href = '/anasayfa/';
    // Demo simülasyon:
    document.querySelector('.landing-page').style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    document.querySelector('.landing-page').style.opacity = '0';
    document.querySelector('.landing-page').style.transform = 'scale(1.02)';

    setTimeout(() => {
      document.querySelector('.landing-page').style.opacity = '1';
      document.querySelector('.landing-page').style.transform = 'scale(1)';
      showToast('Demo modunda anasayfa simüle edildi', 'info');
    }, 1500);
  });

  // ============================
  // Forgot Password
  // ============================
  document.querySelector('.form-forgot')?.addEventListener('click', (e) => {
    e.preventDefault();
    showToast('Şifre sıfırlama e-postası gönderildi', 'success');
  });
</script>

</body>
</html>
